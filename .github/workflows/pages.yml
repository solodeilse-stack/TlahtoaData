name: Quarto Render + Deploy → GitHub Pages
# ============================================================
# @project      Tlahtoa Data 2026
# @author       Jesús Rafael Loggen Gonzalez <loggibooy@gmail.com>
# @architecture Loggen Architecture™
# @copyright    © 2026 Tlahtoa Data Team · CC BY-NC-SA 4.0
# ============================================================

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  render-and-deploy:
    name: Render Quarto + Deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install \
            pandas==2.2.2 \
            plotly==5.22.0 \
            pyyaml==6.0.1 \
            pydantic==2.7.0 \
            openpyxl==3.1.2 \
            jsonschema==4.22.0 \
            requests==2.31.0 \
            beautifulsoup4==4.12.3 \
            kaleido==0.2.1
          echo "✅ Python deps instalados"
          python3 -c "import pandas, plotly, yaml; print('imports OK')"

      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Verify Quarto
        run: quarto --version

      - name: Verify data integrity
        run: |
          python3 -c "
          import json, os, sys
          checks = [
            'data/processed/state_panel.json',
            'data/processed/scenario_templates.json',
            'data/processed/irte_por_estado.csv',
            'data/processed/indicadores_normalizados.csv',
            'data/processed/comparison_payload.json',
            'data/metadata/provenance_manifest.json',
            'data/metadata/data_quality_report.json',
            'data/metadata/irte_sensitivity.csv',
            'data/metadata/source_registry.csv',
            'data/staging/un_external_validation.csv',
            'config/irte_weights.yaml',
            'dashboard/mexico.geojson',
          ]
          for f in checks:
              ok = os.path.exists(f)
              print(f'  {chr(9989) if ok else chr(10060)} {f}')
              if not ok: sys.exit(1)
          d = json.load(open('data/processed/state_panel.json'))
          assert len(d['estados']) == 32
          print(f'\n  32 estados OK — continuando render')
          "

      - name: Render Quarto
        run: |
          quarto render
          echo "Archivos generados:"
          ls docs/ | head -15

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
