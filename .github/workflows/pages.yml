name: Deploy Tlahtoa-Data/Oficial → GitHub Pages
# © 2026 Jesús Rafael Loggen Gonzalez · Loggen Architecture™
# HackODS UNAM 2026

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Verify + Deploy → GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify critical files
        run: |
          echo "=== Verificando archivos críticos ==="
          python3 -c "
          import json, sys

          # 3 archivos que consume el QMD de Zabdiel
          import os
          files = [
            'data/processed/state_panel.json',
            'data/processed/scenario_templates.json',
            'data/processed/irte_por_estado.csv',
          ]
          for f in files:
              ok = os.path.exists(f)
              print(f'  {\"✅\" if ok else \"❌\"} {f}')
              if not ok: sys.exit(1)

          # Validar state_panel.json
          data = json.load(open('data/processed/state_panel.json'))
          estados = data.get('estados', [])
          assert len(estados) == 32, f'ERROR: {len(estados)} estados'
          print(f'  ✅ state_panel.json: {len(estados)} estados')

          # Validar simulations.json
          sims = json.load(open('data/static_api/simulations.json'))
          keys = [k for k in sims if not k.startswith('_')]
          total = sum(sum(len(v) for v in sims[k]['simulations'].values()) for k in keys)
          assert total == 480, f'ERROR: {total} combos'
          print(f'  ✅ simulations.json: {total} combos')
          "

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
