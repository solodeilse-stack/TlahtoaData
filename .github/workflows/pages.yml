name: Quarto Render + Deploy → GitHub Pages
# ============================================================
# @project      Tlahtoa Data 2026
# @author       Jesús Rafael Loggen Gonzalez <loggibooy@gmail.com>
# @architecture Loggen Architecture™
# @copyright    © 2026 Tlahtoa Data Team · CC BY-NC-SA 4.0
# ============================================================

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  render-and-deploy:
    name: Render Quarto + Deploy
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            jupyter nbformat nbclient ipykernel \
            pandas plotly pyyaml pydantic \
            openpyxl jsonschema requests beautifulsoup4 tabulate
          python3 -m ipykernel install --user
          python3 -c "import pandas, plotly, nbformat; print('✅ imports OK')"

      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Verify data
        run: |
          python3 -c "
          import json, os, sys
          checks = [
            'data/processed/state_panel.json',
            'data/processed/scenario_templates.json',
            'data/processed/irte_por_estado.csv',
            'data/processed/indicadores_normalizados.csv',
            'data/processed/comparison_payload.json',
            'data/metadata/provenance_manifest.json',
            'data/metadata/data_quality_report.json',
            'data/metadata/irte_sensitivity.csv',
            'data/metadata/source_registry.csv',
            'data/staging/un_external_validation.csv',
            'config/irte_weights.yaml',
            'dashboard/mexico.geojson',
          ]
          for f in checks:
              ok = os.path.exists(f)
              print(f'  {chr(9989) if ok else chr(10060)} {f}')
              if not ok: sys.exit(1)
          print('✅ Todos los datos OK')
          "

      - name: Render Quarto
        run: |
          quarto render \
            --no-cache
        env:
          QUARTO_DENO_EXTRA_OPTIONS: "--v8-flags=--max-old-space-size=4096"

      - name: Verify output
        run: |
          echo "=== docs/ ==="
          ls docs/
          echo "=== dashboard pages ==="
          ls docs/dashboard/
          echo "=== juego React ==="
          ls docs/dashboard/juego/index.html && echo "✅ Juego OK"
          echo "=== redirect root ==="
          cat docs/index.html | head -5

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
